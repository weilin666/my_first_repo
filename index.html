<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pong in the Sandbox</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <header class="topbar">
        <h1>Ping Pong</h1>
        <p>First to 10 points wins. Use <kbd>W</kbd> / <kbd>S</kbd> or <kbd>↑</kbd> / <kbd>↓</kbd>.</p>
      </header>

      <section class="hud" aria-live="polite">
        <div class="score-card">
          <span>You</span>
          <strong id="player-score">0</strong>
        </div>
        <div class="score-card">
          <span>CPU</span>
          <strong id="cpu-score">0</strong>
        </div>
      </section>

      <canvas id="pong-canvas" width="900" height="500" aria-label="Pong game board"></canvas>

      <section class="controls">
        <button id="start-btn">Start Game</button>
        <button id="restart-btn">Restart</button>
        <p id="status">Press Start to serve the ball.</p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
